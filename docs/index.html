<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lantero — Family Learning Planner</title>
<meta name="description" content="A private, on-device planner for parent-led family learning.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1F2A44">
<link rel="icon" href="icons/icon-512.png">
<link rel="apple-touch-icon" href="icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lantero">
<style>
  /* Lantero Design System v2 tokens — see "Lantero Design System/tokens/" */
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Young+Serif&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400;1,8..60,600&family=Space+Mono:ital,wght@0,400;0,700&display=swap');
  :root{
    --parchment:#F6EFE3; --parchment-deep:#EFE5D2; --ink:#2B2620; --navy:#1F2A44;
    --navy-soft:#33415F; --amber:#E8A13D; --amber-deep:#C97F1D; --amber-glow:#F7C873;
    --green:#5F8C5A; --red:#B85C45; --dim:#8D94A8; --card:#FFFDF8; --line:#DCCFB4;
    --font-display:'Bricolage Grotesque','Public Sans',system-ui,sans-serif;
    --font-ceremony:'Young Serif',Georgia,'Times New Roman',serif;
    --font-body:'Source Serif 4',Georgia,'Times New Roman',serif;
    --font-mono:'Space Mono',ui-monospace,Menlo,monospace;
    --tracking-label:0.08em; --tracking-seal:0.18em;
    --shadow-1:0 1px 2px rgba(43,38,32,.08); --shadow-2:0 4px 14px rgba(43,38,32,.08);
    --ease-out:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--font-body); background:var(--parchment); color:var(--ink); line-height:1.45;}
  :focus-visible{outline:2px solid var(--amber-deep); outline-offset:2px; border-radius:4px;}
  header{background:var(--navy); color:var(--parchment); padding:10px 20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; row-gap:6px;}
  header .lamp svg{width:30px; height:35px; display:block;}
  header h1{font-family:var(--font-display); font-size:18px; letter-spacing:var(--tracking-seal); font-weight:600; color:var(--parchment);}
  header .who{margin-left:auto; font-size:13px; opacity:.85; font-family:var(--font-display);}
  .brand{display:flex; align-items:center; gap:12px; cursor:pointer; background:none; border:none; color:inherit; padding:0; font:inherit; text-align:left;}
  .fb-btn{margin-left:10px; background:none; border:1px solid var(--amber); color:var(--amber-glow); border-radius:6px; padding:5px 10px; font-family:var(--font-display); font-size:12px; font-weight:600; letter-spacing:var(--tracking-label); cursor:pointer;}
  .fb-btn:hover{background:var(--navy-soft);}
  nav{display:flex; flex-wrap:wrap; gap:2px; background:var(--navy-soft); padding:0 12px;}
  nav button{background:none; border:none; color:var(--parchment); padding:10px 14px; font-family:var(--font-display); font-size:13.5px; font-weight:500; letter-spacing:var(--tracking-label); cursor:pointer; border-bottom:3px solid transparent; transition:color 200ms var(--ease-out);}
  nav button.active{border-bottom-color:var(--amber); color:var(--amber-glow);}
  nav button:hover{color:var(--amber-glow);}
  main{max-width:1000px; margin:0 auto; padding:20px;}
  h2{font-family:var(--font-ceremony); font-size:22px; color:var(--navy); margin-bottom:10px; font-weight:normal;}
  h3{font-family:var(--font-display); font-size:15px; font-weight:600; color:var(--navy); margin:14px 0 6px;}
  .card{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:14px 16px; margin-bottom:14px; box-shadow:var(--shadow-1);}
  .muted{color:#6f6757; font-size:13px;}
  .num{font-family:var(--font-mono); font-size:.92em;}
  .small{font-size:12.5px;}
  .row{display:flex; flex-wrap:wrap; gap:12px;}
  .col{flex:1; min-width:260px;}
  button.btn{background:var(--navy); color:var(--parchment); border:none; border-radius:6px; padding:8px 14px; font-family:var(--font-display); font-weight:600; font-size:14px; cursor:pointer; transition:background 200ms var(--ease-out);}
  button.btn:hover{background:var(--navy-soft);}
  button.btn.amber{background:var(--amber); color:var(--ink);}
  button.btn.amber:hover{background:var(--amber-glow);}
  button.btn.ghost{background:none; color:var(--navy); border:1px solid var(--navy); font-weight:500;}
  button.btn.sm{padding:4px 10px; font-size:12.5px;}
  input[type=text],input[type=number],input[type=date],select,textarea{
    font-family:var(--font-body); font-size:14px; padding:7px 9px; border:1px solid var(--line);
    border-radius:6px; background:#fff; color:var(--ink); width:100%;}
  textarea{min-height:64px;}
  label{font-family:var(--font-display); font-size:12.5px; font-weight:500; letter-spacing:var(--tracking-label); color:var(--navy); display:block; margin:8px 0 3px;}
  .chips{display:flex; flex-wrap:wrap; gap:6px; margin:6px 0;}
  .chip{border:1px solid var(--line); background:#fff; border-radius:16px; padding:5px 12px; font-family:var(--font-display); font-size:13px; cursor:pointer; user-select:none; transition:all 150ms var(--ease-out);}
  .chip.on{background:var(--amber-glow); border-color:var(--amber-deep);}
  .pill{display:inline-block; border-radius:10px; padding:2px 9px; font-family:var(--font-display); font-size:11px; font-weight:500; color:#fff;}
  .pill.core{background:var(--navy-soft);} .pill.life{background:var(--amber-deep);} .pill.enrich{background:var(--green);}
  .flag{border-left:4px solid var(--amber-deep); background:var(--parchment-deep); padding:8px 12px; border-radius:0 6px 6px 0; margin:6px 0; font-size:13.5px;}
  .flag.bad{border-left-color:var(--red);} .flag.good{border-left-color:var(--green);}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th,td{text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); vertical-align:top;}
  th{font-family:var(--font-display); color:var(--navy); font-weight:500; font-size:11.5px; text-transform:uppercase; letter-spacing:var(--tracking-label);}
  .mission{border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin:8px 0; background:var(--card); box-shadow:var(--shadow-1);}
  .mission h4{font-family:var(--font-ceremony); color:var(--navy); font-size:16.5px; font-weight:normal; margin-bottom:4px;}
  .mission .hook{font-style:italic; margin:4px 0;}
  .scene{margin:6px 0;}
  .scene-stage{margin:2px 0 6px;}
  .mission .meta{font-family:var(--font-display); font-size:11.5px; color:#6f6757; margin-bottom:6px;}
  .mission.done{opacity:.78; border-left:4px solid var(--green);}
  .mission.skipped{opacity:.6;}
  .scroll-seal{font-family:var(--font-display); font-size:10.5px; font-weight:600; color:var(--amber-deep); letter-spacing:var(--tracking-seal); text-transform:uppercase;}
  /* v2 charted-route progress (replaces the filled bar) */
  .route{display:block; max-width:340px; width:100%; height:auto; margin:8px 0 2px;}
  /* v2 level dots — parent-side proficiency */
  .ldots{display:inline-flex; gap:4px; vertical-align:middle;}
  .ldot{width:9px; height:9px; border-radius:50%; border:1px solid var(--line); background:transparent;}
  .ldot.on{background:var(--amber-glow); border-color:var(--amber-deep);}
  /* proficiency state markers — worded, not glyphs */
  .mk{font-family:var(--font-display); font-size:11.5px; font-weight:500; letter-spacing:.02em; margin-left:6px;}
  .mk.wob{color:var(--red);} .mk.rdy{color:var(--green);}
  /* curiosity "new territory" tag with the brand star */
  .newterr{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.04em; color:var(--amber-deep); white-space:nowrap;}
  .star4{width:11px; height:11px; display:inline-block; vertical-align:-1px;}
  .grid7{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
  .daycell{border:1px solid var(--line); border-radius:6px; background:var(--card); padding:6px; min-height:84px; font-size:12px;}
  .daycell .dnum{color:var(--navy); font-size:12px;}
  .daycell.today{outline:2px solid var(--amber);}
  .daycell.off{opacity:.45;}
  .mday{display:flex; align-items:center; gap:4px; font-size:10.5px; color:var(--ink); line-height:1.5;}
  .mday .mdlabel{white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin:1px;}
  .modal-back{position:fixed; inset:0; background:rgba(31,42,68,.55); display:none; align-items:flex-start; justify-content:center; overflow:auto; padding:30px 10px; z-index:50;}
  .modal-back.open{display:flex;}
  .modal{background:var(--card); border-radius:10px; max-width:640px; width:100%; padding:20px 22px; border:1px solid var(--line);}
  .steps{font-family:var(--font-display); font-size:11px; font-weight:600; color:var(--amber-deep); letter-spacing:var(--tracking-seal); text-transform:uppercase; margin-bottom:6px;}
  .lvl{display:flex; gap:4px;}
  .lvl button{width:30px; height:30px; border-radius:50%; border:1px solid var(--line); background:#fff; cursor:pointer; font-family:inherit;}
  .lvl button.on{background:var(--amber-glow); border-color:var(--amber-deep);}
  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:12px; margin-top:8px;}
  .legend span{display:flex; align-items:center; gap:5px;}
  .sw{width:13px; height:13px; border-radius:3px; display:inline-block;}
  /* ---- phone layout (A0.1 calendars / A0.2 tables & modals) ---- */
  @media (max-width:560px){
    main{padding:14px;}
    header{padding:10px 14px;}
    header h1{font-size:16px;}
    nav button{padding:9px 11px; font-size:13px;}
    .row .col{min-width:0; flex-basis:100%;}
    /* Week: stack the seven days into one readable column */
    .grid7.week7{grid-template-columns:1fr;}
    .grid7.week7 .daycell{min-height:0;}
    /* Month: keep the grid, compact to dots-only */
    .grid7.month7{gap:3px;}
    .grid7.month7 .daycell{min-height:46px; padding:3px; font-size:10px;}
    .grid7.month7 .daycell .dnum{font-size:10px;}
    th,td{padding:5px 6px;}
    .lvl{flex-wrap:wrap;}
    .modal-back{padding:16px 8px;}
    .grid7.month7 .mday{display:inline-flex; margin:0 3px 0 0;}
    .grid7.month7 .mday .mdlabel{display:none;}
  }
  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute; left:0; top:0; width:100%; padding:30px; font-size:14px;}
  }
</style>
</head>
<body>
<header>
  <span class="brand" onclick="go('today')" role="link" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();go('today');}" title="Back to Today" aria-label="Lantero — go to Today">
  <span class="lamp"><svg viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lantero mark"><g stroke="#E8A13D" stroke-width="2" stroke-linecap="round"><line x1="60" y1="118" x2="60" y2="126"/><line x1="89" y1="106" x2="94.6" y2="111.6"/><line x1="101" y1="77" x2="109" y2="77"/><line x1="89" y1="48" x2="94.6" y2="42.4"/><line x1="31" y1="48" x2="25.4" y2="42.4"/><line x1="19" y1="77" x2="11" y2="77"/><line x1="31" y1="106" x2="25.4" y2="111.6"/></g><circle cx="60" cy="20" r="8" stroke="#F6EFE3" stroke-width="3.5"/><path d="M52 36 L54 29 H66 L68 36 Z" fill="#F6EFE3"/><path d="M46 36 H74" stroke="#F6EFE3" stroke-width="3.5" stroke-linecap="round"/><path d="M48 36 L72 36 L80 48 L80 100 Q80 106 74 106 L46 106 Q40 106 40 100 L40 48 Z" stroke="#F6EFE3" stroke-width="3.5" stroke-linejoin="round" fill="none"/><path d="M60 54 L64.2 67.8 L78 72 L64.2 76.2 L60 90 L55.8 76.2 L42 72 L55.8 67.8 Z" fill="#F7C873"/><path d="M34 118 H86" stroke="#F6EFE3" stroke-width="3.5" stroke-linecap="round"/></svg></span>
  <h1>LANTERO <span class="small" style="opacity:.7; letter-spacing:normal; font-weight:400">&middot; the map room</span></h1>
  </span>
  <span class="who" id="hdrWho"></span>
  <button class="fb-btn" onclick="openFeedback()" title="Send feedback to the maker">Send feedback</button>
</header>
<nav id="nav"></nav>
<main id="view"></main>
<div class="modal-back" id="modalBack"><div class="modal" id="modalBox"></div></div>
<div id="printArea" style="display:none"></div>

<script>
"use strict";
/* ================= UTILITIES ================= */
function $(id){return document.getElementById(id);}
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
function uid(){return Math.random().toString(36).slice(2,10);}
function todayYMD(){return toYMD(new Date());}
function toYMD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function fromYMD(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function addDays(s,n){var d=fromYMD(s);d.setDate(d.getDate()+n);return toYMD(d);}
function weekStart(s){var d=fromYMD(s);var dow=(d.getDay()+6)%7;d.setDate(d.getDate()-dow);return toYMD(d);}
function monthName(m){return ["January","February","March","April","May","June","July","August","September","October","November","December"][m];}
function fmtDate(s){var d=fromYMD(s);return monthName(d.getMonth())+" "+d.getDate();}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}

/* ================= V2 MOTIFS ================= */
/* Brand four-point star — curiosity "new territory" tag and route waypoint. */
var STAR4='<svg class="star4" viewBox="-8 -8 16 16" aria-hidden="true"><path d="M0 -7 L2.4 -2.4 L7 0 L2.4 2.4 L0 7 L-2.4 2.4 L-7 0 L-2.4 -2.4 Z" fill="var(--amber-deep)"/></svg>';
/* Charted-route progress: dotted hairline path; lit waypoints = mission-days
   travelled; the star destination lights when the week's target is reached.
   Progress is route travelled, never a bar filled. */
function routeProgressSVG(done,target){
  target=Math.max(1,target|0); done=clamp(done|0,0,target);
  var W=320,H=46,padL=14,xEnd=W-24,y=23,lastDot=xEnd-22;
  var step=(target>1)?(lastDot-padL)/(target-1):0;
  function dx(i){return padL+i*step;}
  var s='<svg class="route" viewBox="0 0 '+W+' '+H+'" role="img" aria-label="'+done+' of '+target+' mission-days travelled this week">';
  s+='<line x1="'+padL+'" y1="'+y+'" x2="'+xEnd+'" y2="'+y+'" stroke="var(--line)" stroke-width="1.6" stroke-dasharray="1 7" stroke-linecap="round"/>';
  var tEnd=done<=0?padL:(done>=target?xEnd:dx(done-1));
  if(done>0) s+='<line x1="'+padL+'" y1="'+y+'" x2="'+tEnd.toFixed(1)+'" y2="'+y+'" stroke="var(--amber-deep)" stroke-width="1.6" stroke-linecap="round"/>';
  for(var i=0;i<target;i++){
    var lit=i<done;
    s+='<circle cx="'+dx(i).toFixed(1)+'" cy="'+y+'" r="'+(lit?3.2:2.4)+'" fill="'+(lit?'var(--amber)':'var(--dim)')+'"'+(lit?'':' opacity="0.55"')+'/>';
  }
  var reached=done>=target;
  s+='<path transform="translate('+xEnd+','+y+')" d="M0 -8 L2.8 -2.8 L8 0 L2.8 2.8 L0 8 L-2.8 2.8 L-8 0 L-2.8 -2.8 Z" fill="'+(reached?'var(--amber)':'none')+'" stroke="'+(reached?'none':'var(--dim)')+'" stroke-width="1.4" stroke-linejoin="round"'+(reached?'':' opacity="0.7"')+'/>';
  return s+'</svg>';
}
/* Parent-side proficiency level dots (1–5); never shown to the child. */
function levelDots(level){
  var s='<span class="ldots" role="img" aria-label="level '+level+' of 5">';
  for(var i=1;i<=5;i++) s+='<span class="ldot'+(i<=level?' on':'')+'"></span>';
  return s+'</span>';
}

/* ================= SUBJECTS ================= */
var SUBJECTS=[
  {id:"reading",   name:"Reading",                grp:"core",  hs:13, sum:13},
  {id:"writing",   name:"Writing & Spelling",     grp:"core",  hs:9,  sum:6},
  {id:"math",      name:"Math",                   grp:"core",  hs:13, sum:11},
  {id:"science",   name:"Science",                grp:"core",  hs:9,  sum:9},
  {id:"social",    name:"Social Studies & History",grp:"core", hs:7,  sum:5},
  {id:"geography", name:"Geography & Maps",       grp:"core",  hs:4,  sum:4},
  {id:"civics",    name:"Civics & Citizenship",   grp:"core",  hs:3,  sum:2},
  {id:"health",    name:"Health & Safety",        grp:"core",  hs:4,  sum:4},
  {id:"pe",        name:"Physical Education",     grp:"enrich",hs:8,  sum:11},
  {id:"art",       name:"Art",                    grp:"enrich",hs:5,  sum:7},
  {id:"music",     name:"Music",                  grp:"enrich",hs:3,  sum:4},
  {id:"spanish",   name:"Spanish",                grp:"enrich",hs:6,  sum:6},
  {id:"speaking",  name:"Public Speaking",        grp:"life",  hs:3,  sum:3},
  {id:"conflict",  name:"Conflict Resolution",    grp:"life",  hs:2,  sum:3},
  {id:"courage",   name:"Courage & Confidence",   grp:"life",  hs:4,  sum:5},
  {id:"finlit",    name:"Financial Literacy",     grp:"life",  hs:3,  sum:3},
  {id:"entrep",    name:"Entrepreneurship",       grp:"life",  hs:2,  sum:2},
  {id:"thinking",  name:"Independent Thinking",   grp:"life",  hs:2,  sum:2}
];
function subj(id){for(var i=0;i<SUBJECTS.length;i++)if(SUBJECTS[i].id===id)return SUBJECTS[i];return null;}
var CURIOSITY=["volcanoes","the deep ocean","ancient Egypt","robots","birds of prey","weather and storms","castles and knights","insects","bridges and tunnels","planets we have never visited","whales","deserts","rainforests","how machines work","famous explorers","music from around the world","caves and crystals","trains","lighthouses","maps of the old world"];

/* ================= STATE ================= */
var KEY="lantero_v1";
var SCHEMA_VERSION=1;
var S=null;
var loadError=false; /* set true when a saved blob exists but couldn't be parsed */
function defaultState(){
  return {
    version:1, onboarded:false,
    profile:{childName:"",heroName:"",age:6,parentName:"",usState:"South Carolina",
      mode:"summer", /* homeschool | summer | afterschool */
      interests:[], /* {id,name,weight,uses} */
      prefs:{sessionMin:20,formats:[],bestTime:"morning",screens:"low"},
      lifePriorities:[], notes:""},
    prof:{}, /* subjectId -> {level:1-5, struggle:0, advance:0} */
    targets:{}, /* subjectId -> weight */
    schedule:{daysPerWeek:5, dailyMin:60, offDays:[0,6]}, /* offDays: JS getDay() numbers */
    missions:[], /* see spec */
    weekPlans:{}, /* weekStartYMD -> {note, targetCount} */
    monthPlans:{}, /* "YYYY-MM" -> {note} */
    quarters:[], /* {id,name,start,end,goals} */
    pulse:[], /* {week, willing:1-5, parentEnergy:1-5, note} */
    extraLog:[] /* {date, minutes, subject, note} manual entries */
  };
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
/* Forward-compatible: merge a loaded blob onto current defaults so a blob from an
   older (or newer) build never crashes on a missing key. Version hook for Phase B. */
function migrate(state){
  if(!state||typeof state!=="object") return defaultState();
  var base=defaultState();
  for(var k in base){ if(!(k in state)) state[k]=base[k]; }
  state.profile=Object.assign({}, base.profile, state.profile||{});
  state.profile.prefs=Object.assign({}, base.profile.prefs, (state.profile&&state.profile.prefs)||{});
  state.schedule=Object.assign({}, base.schedule, state.schedule||{});
  state.version=SCHEMA_VERSION;
  return state;
}
function load(){
  var raw=null;
  try{raw=localStorage.getItem(KEY);}catch(e){}
  if(raw){
    try{ S=migrate(JSON.parse(raw)); return; }
    catch(e){
      /* Don't silently erase recoverable data — keep the unreadable blob aside. */
      try{localStorage.setItem(KEY+"_corrupt",raw);}catch(e2){}
      loadError=true;
    }
  }
  S=defaultState();
}
function initProf(){
  SUBJECTS.forEach(function(sb){ if(!S.prof[sb.id]) S.prof[sb.id]={level:2,struggle:0,advance:0}; });
}
function applyModeTargets(){
  SUBJECTS.forEach(function(sb){ S.targets[sb.id]=(S.profile.mode==="homeschool")?sb.hs:sb.sum; });
}
function targetShare(id){
  var tot=0; SUBJECTS.forEach(function(sb){tot+=(S.targets[sb.id]||0);});
  return tot? (S.targets[id]||0)/tot : 0;
}

/* ================= ACTIVITY MATH ================= */
function doneMissions(){return S.missions.filter(function(m){return m.status==="done";});}
function minutesBySubject(sinceDays){
  var cutoff=addDays(todayYMD(),-sinceDays), map={};
  SUBJECTS.forEach(function(sb){map[sb.id]=0;});
  doneMissions().forEach(function(m){ if(m.date>=cutoff) map[m.subject]=(map[m.subject]||0)+(m.minutes||20); });
  S.extraLog.forEach(function(e){ if(e.date>=cutoff && map[e.subject]!=null) map[e.subject]+=(+e.minutes||0); });
  return map;
}
function coverageRatio(id,sinceDays){
  var map=minutesBySubject(sinceDays), tot=0;
  for(var k in map) tot+=map[k];
  if(!tot) return null;
  var share=map[id]/tot, tgt=targetShare(id);
  return tgt? share/tgt : 0;
}
function schoolDays(start,end){

function totalMinutes(start,end){

function fill(str,interest){
  return String(str).split("{I}").join(interest).split("{C}").join(S.profile.heroName||S.profile.childName||"the Captain");
}
function recentMissions(n){
  return S.missions.slice().sort(function(a,b){return (b.date||"").localeCompare(a.date||"");}).slice(0,n);
}
function pickInterest(){
  var recent=recentMissions(5).map(function(m){return m.interest;});
  /* curiosity injection ~20%: diverse exposure, new topics */
  if(Math.random()<0.2 || S.profile.interests.length===0){
    return {name:pick(CURIOSITY), curiosity:true};
  }
  var pool=S.profile.interests.filter(function(it){
    var uses=recent.filter(function(r){return r===it.name;}).length;
    return uses<3; /* diversity guardrail: blocked after 3 of last 5 */
  });
  if(pool.length===0) pool=S.profile.interests;
  var tot=0; pool.forEach(function(it){tot+=it.weight;});
  var r=Math.random()*tot;
  for(var i=0;i<pool.length;i++){ r-=pool[i].weight; if(r<=0) return {name:pool[i].name, curiosity:false}; }
  return {name:pool[pool.length-1].name, curiosity:false};
}
function neediestSubject(){
  var worst=null, worstR=1e9;
  SUBJECTS.forEach(function(sb){
    var r=coverageRatio(sb.id,21); if(r===null) r=0;
    if(r<worstR){worstR=r; worst=sb.id;}
  });
  return worst||"reading";
}
function generateMission(opts){
  opts=opts||{};
  var sid=opts.subject||neediestSubject();
  var tArr=TEMPLATES[sid]||TEMPLATES.reading;
  var tmpl=pick(tArr);
  var iv=opts.interest? {name:opts.interest,curiosity:false} : pickInterest();
  var p=S.prof[sid]||{level:2,struggle:0,advance:0};
  var diff=opts.reset? "easy" : (p.level>=4? "hard" : (p.level<=2? "easy":"std"));
  var mins=opts.minutes|| (opts.reset?10:(S.profile.prefs.sessionMin||20));
  var m={
    id:uid(), date:opts.date||todayYMD(), subject:sid, interest:iv.name, curiosity:iv.curiosity,
    title:fill(tmpl.t,iv.name), hook:fill(tmpl.hook,iv.name), scene:fill(tmpl.scene||tmpl.hook,iv.name), goal:fill(tmpl.goal,iv.name),
    mat:fill(tmpl.mat,iv.name), steps:fill(tmpl.steps,iv.name),
    variant:diff, easy:fill(tmpl.easy,iv.name), hard:fill(tmpl.hard,iv.name),
    fallback:pick(FALLBACKS), reflect:pick(REFLECTS),
    minutes:mins, status:"planned", reset:!!opts.reset, feedback:null
  };
  return m;
}
function addMission(m){S.missions.push(m); save();}
/* Split a scene string into [read-aloud story, staging cue] on the "Setting the scene:" marker. */
function sceneParts(text){
  var t=String(text||""); if(!t) return ["",""];
  var i=t.indexOf("Setting the scene:");
  if(i<0) return [t.trim(),""];
  return [t.slice(0,i).trim(), t.slice(i+"Setting the scene:".length).trim()];
}

function chipPick(el,groupId){
  var sibs=$(groupId).querySelectorAll(".chip");
  for(var i=0;i<sibs.length;i++) sibs[i].classList.remove("on");
  el.classList.add("on");
}
function chipVal(groupId){var el=$(groupId).querySelector(".chip.on"); return el?el.getAttribute("data-v"):null;}
function saveFeedback(id){
  var m=getMission(id); if(!m) return;
  var liked=chipVal("fbLiked")||"it was ok";
  var eng=+(chipVal("fbEng")||1);
  var diff=chipVal("fbDiff")||"just right";
  m.status="done"; m.minutes=+($("fbMin").value)||m.minutes;
  m.feedback={childLiked:liked, childNote:$("fbChildNote").value, engagement:eng, difficulty:diff, note:$("fbNote").value};
  /* interest weights: like/dislike nudges, capped */
  var it=null; S.profile.interests.forEach(function(x){if(x.name===m.interest)it=x;});
  if(liked==="loved it"){
    if(it) it.weight=clamp(it.weight+0.2,0.2,3);
    else if(m.curiosity) S.profile.interests.push({id:uid(),name:m.interest,weight:1,uses:0}); /* curiosity hit -> becomes a real interest */
  }
  if(liked==="not for me" && it) it.weight=clamp(it.weight-0.2,0.2,3);
  /* proficiency engine */
  var p=S.prof[m.subject];
  if(diff==="struggled"){p.struggle++; p.advance=0;}
  else if(diff==="too easy"){p.advance++; p.struggle=0;}
  else {p.struggle=0; p.advance=(eng>=2? p.advance:0);}
  if(p.advance>=2){p.level=clamp(p.level+1,1,5); p.advance=0;}
  if(p.struggle>=3){p.level=clamp(p.level-1,1,5);} /* after flag at 2, gentle level-down at 3 */
  save(); closeModal(); renderView();
}
function strugglingSubjects(){
  return SUBJECTS.filter(function(sb){return (S.prof[sb.id]||{}).struggle>=2;});
}
function advancingSubjects(){
  return SUBJECTS.filter(function(sb){var p=S.prof[sb.id]||{}; return p.level>=4&&p.advance>=1 || p.advance>=2;});
}
function generateReset(sid){
  var m=generateMission({subject:sid,reset:true});
  addMission(m); go("today");
}

function exportReport(qid){
  var q=null; S.quarters.forEach(function(x){if(x.id===qid)q=x;}); if(!q) return;
  var days=schoolDays(q.start,q.end), mins=totalMinutes(q.start,q.end), hrs=mins/60;
  var prof=S.profile||{};
  var grade=prof.age?Math.max(0,prof.age-5):null;
  /* gather per-subject minutes, sessions, and dated activities (missions + logged learning) */
  var data={}; SUBJECTS.forEach(function(sb){data[sb.id]={min:0,sessions:0,items:[]};});
  doneMissions().forEach(function(m){
    if(m.date>=q.start&&m.date<=q.end&&data[m.subject]){
      data[m.subject].min+=(m.minutes||20); data[m.subject].sessions++;
      var fn=m.feedback&&(m.feedback.note||m.feedback.childNote)?(" — "+(m.feedback.note||m.feedback.childNote)):"";
      data[m.subject].items.push({date:m.date, text:m.title+fn});
    }
  });
  S.extraLog.forEach(function(e){
    if(e.date>=q.start&&e.date<=q.end&&data[e.subject]){
      data[e.subject].min+=(+e.minutes||0); data[e.subject].sessions++;
      data[e.subject].items.push({date:e.date, text:(e.note||"Logged learning")+" (logged activity)"});
    }

  var covered=SUBJECTS.filter(function(sb){return data[sb.id].min>0;});
  var untouched=SUBJECTS.filter(function(sb){return data[sb.id].min===0;});
  var totalSessions=0; SUBJECTS.forEach(function(sb){totalSessions+=data[sb.id].sessions;});
  var methods=(prof.prefs&&prof.prefs.formats&&prof.prefs.formats.length)? prof.prefs.formats.join(", ")
    : "interest-based mission design; hands-on activities, reading, projects, and real-world tasks";

  var r="LANTERO — QUARTERLY HOMESCHOOL PROGRESS REPORT\n";
  r+="Parent-maintained record · built to the superset standard (NY / PA / MA / RI-grade)\n";
  r+="==================================================================\n\n";

  r+="STUDENT & PERIOD\n";
  r+="  Student: "+(prof.childName||"—")+"     Age: "+(prof.age||"—")+(grade!=null?"   (approx. grade "+grade+")":"")+"\n";
  r+="  Instructor (parent): "+(prof.parentName||"—")+"   Qualification: HS diploma / GED (documentation retained by family)\n";
  r+="  Reporting period: "+q.start+" to "+q.end+"   (Quarter: "+q.name+")\n";
  r+="  Home state: "+(prof.usState||"—")+"\n\n";

  r+="ATTENDANCE & INSTRUCTIONAL TIME  (RI/NY-grade time accounting)\n";

  r+="  Instructional hours this period: "+hrs.toFixed(1)+"\n";
  r+="  Full-year targets for reference: 180 days · 900–1,080 hours (1,080 = ceiling case).\n";
  r+="  Hours are parent-side bookkeeping derived from the activity log; they are never shown to the child as quotas.\n\n";

  r+="SUBJECTS COVERED  (NY-union subject list)\n";
  if(covered.length===0){ r+="  (No completed activity recorded for this period yet.)\n"; }
  covered.forEach(function(sb){
    var d=data[sb.id], p=S.prof[sb.id]||{level:2};
    r+="\n  "+sb.name+" — "+(d.min/60).toFixed(1)+" hrs · "+d.sessions+" session(s)\n";
    r+="    Progress: "+levelWord(p.level)+".\n";
    r+="    Representative activities:\n";
    d.items.sort(function(a,b){return a.date.localeCompare(b.date);}).forEach(function(it){
      r+="      - "+fmtDate(it.date)+": "+it.text+"\n";
    });
  });
  if(untouched.length){
    r+="\n  Subjects not yet touched this period (planned for the upcoming period): "
      +untouched.map(function(sb){return sb.name;}).join(", ")+"\n";
  }
  r+="\n  Overall methods & materials: "+methods+".\n\n";

  r+="SAFETY & CITIZENSHIP MODULE  (superset annual extras)\n";
  r+="  Safety / fire-prevention education (Health): "+(data.health.min>0?"addressed this period":"not yet this period — flag for annual coverage")+"\n";
  r+="  Citizenship / U.S. Constitution / patriotism (Civics): "+(data.civics.min>0?"addressed this period":"not yet this period")+"\n\n";

  r+="ASSESSMENT\n";
  r+="  Method: narrative progress evaluation from the parent observation log.\n";
  r+="  Grades 1–3: a narrative evaluation suffices. From grade 3 onward, standardized-test capability is available (CAT / ITBS / Stanford, parent-administered versions).\n";
  r+="  Summary: the student engaged across "+covered.length+" subject area(s) this period, with effort-based progress as noted above.\n\n";

  r+="PORTFOLIO\n";
  r+="  Work samples / mission records retained this period: "+totalSessions+" logged session(s).\n";
  r+="  Lantero mission records and printed mission scrolls form the portfolio index.\n\n";

  r+="GOALS\n";
  r+="  Goals for this period: "+(q.goals||"—")+"\n";
  r+="  Goals for next period: ____________________________________________\n\n";

  var scCore=[["reading","Reading"],["writing","Writing"],["math","Math"],["science","Science"],["social","Social studies"]];
  var scCov=scCore.filter(function(c){return data[c[0]]&&data[c[0]].min>0;}).map(function(c){return c[1];});
  var scMiss=scCore.filter(function(c){return !(data[c[0]]&&data[c[0]].min>0);}).map(function(c){return c[1];});
  r+="—— SOUTH CAROLINA SUMMARY (home-state checklist) ——\n";
  r+="  SC universal floor (all three options): parent HS diploma/GED · 180 instructional days/year · subjects: reading, writing, math, science, social studies (+ composition & literature in grades 7–12).\n";
  r+="  This period: "+days+" instructional day(s) logged.\n";
  r+="  SC core subjects covered: "+(scCov.length?scCov.join(", "):"none yet")+".\n";
  if(scMiss.length) r+="  SC core not yet covered this period: "+scMiss.join(", ")+".\n";
  r+="  Common SC path: Option 3 accountability association (semiannual progress reports, typically a portfolio, often no required testing). This document can serve as an Option 3 semiannual progress report.\n\n";

  r+="Generated by Lantero — parent-maintained records. Informational only, not legal advice; verify current requirements with HSLDA and the South Carolina Department of Education.\n";

  openModal('<div class="steps">quarterly report</div><h2>'+esc(q.name)+'</h2>'

   +'<button class="btn ghost" onclick="closeModal()">Close</button></div>');
}

      +'<button class="btn sm ghost" onclick="downloadCorrupt()">Download the kept copy</button></div>';

/* ==SECTION:DASHBOARD== */
function heatColor(r){
  if(r===null) return "#cdc6b8";
  if(r<0.35) return "#8d94a8";      /* dim — neglected */
  if(r<0.8)  return "#e8c989";      /* warming */
  if(r<=1.35) return "#e8a13d";     /* glowing — on target */
  if(r<=2.0) return "#c97f1d";      /* hot — leaning heavy */
  return "#b85c45";                 /* over-indexed */
}
function heatMapSVG(){
  var cx=180, cy=180, r0=70, r1=160, n=SUBJECTS.length;
  var svg='<svg viewBox="-55 -8 470 376" style="max-width:440px; width:100%;">';
  for(var i=0;i<n;i++){
    var sb=SUBJECTS[i];
    var a0=(i/n)*2*Math.PI - Math.PI/2, a1=((i+1)/n)*2*Math.PI - Math.PI/2;
    var gap=0.012;
    a0+=gap; a1-=gap;
    var ratio=coverageRatio(sb.id,21);
    var x0=cx+r0*Math.cos(a0), y0=cy+r0*Math.sin(a0);
    var x1=cx+r1*Math.cos(a0), y1=cy+r1*Math.sin(a0);
    var x2=cx+r1*Math.cos(a1), y2=cy+r1*Math.sin(a1);
    var x3=cx+r0*Math.cos(a1), y3=cy+r0*Math.sin(a1);
    var large=(a1-a0)>Math.PI?1:0;
    svg+='<path d="M'+x0.toFixed(1)+' '+y0.toFixed(1)+' L'+x1.toFixed(1)+' '+y1.toFixed(1)
      +' A'+r1+' '+r1+' 0 '+large+' 1 '+x2.toFixed(1)+' '+y2.toFixed(1)
      +' L'+x3.toFixed(1)+' '+y3.toFixed(1)
      +' A'+r0+' '+r0+' 0 '+large+' 0 '+x0.toFixed(1)+' '+y0.toFixed(1)+' Z" fill="'+heatColor(ratio)+'" stroke="#f6efe3" stroke-width="1">'
      +'<title>'+esc(sb.name)+": "+(ratio===null?"no activity yet":(100*ratio).toFixed(0)+"% of target attention (21 days)")+'</title></path>';
    /* label */
    var am=(a0+a1)/2, lr=r1+14;
    var lx=cx+lr*Math.cos(am), ly=cy+lr*Math.sin(am);
    var anchor=Math.cos(am)>0.3?"start":(Math.cos(am)<-0.3?"end":"middle");
    var short=sb.name.split(" ")[0].replace("&","");
    svg+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" font-size="9" font-family="Bricolage Grotesque,sans-serif" fill="#33415F" text-anchor="'+anchor+'">'+esc(short)+'</text>';
  }
  svg+='<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="13" font-family="Young Serif,Georgia,serif" fill="#1F2A44">the lantern</text>'
    +'<text x="'+cx+'" y="'+(cy+12)+'" text-anchor="middle" font-size="9" font-family="Space Mono,monospace" fill="#6F6757">last 21 days</text></svg>';
  return svg;
}
function viewDash(){
  var h='<h2>Dashboard — where is the light falling?</h2>';
  h+='<div class="row"><div class="col card" style="text-align:center">'+heatMapSVG()
   +'<div class="legend" style="justify-content:center">'
   +'<span><span class="sw" style="background:#8d94a8"></span>dim (neglected)</span>'
   +'<span><span class="sw" style="background:#e8c989"></span>warming</span>'
   +'<span><span class="sw" style="background:#e8a13d"></span>glowing (on target)</span>'
   +'<span><span class="sw" style="background:#b85c45"></span>over-indexed</span></div></div>';
  /* over/under index lists */
  var over=[],under=[];
  var anyData=false;
  SUBJECTS.forEach(function(sb){
    var r=coverageRatio(sb.id,21);
    if(r!==null){anyData=true; if(r>1.6)over.push([sb,r]); if(r<0.45)under.push([sb,r]);}
  });
  h+='<div class="col">';
  if(!anyData){h+='<div class="card muted">Complete a few missions and the lantern lights up.</div>';}
  else{
    if(over.length){h+='<div class="card"><h3>Leaning heavy (over-indexing)</h3>';
      over.sort(function(a,b){return b[1]-a[1];}).forEach(function(x){h+='<div class="flag">'+x[0].name+' is taking '+(100*x[1]).toFixed(0)+'% of its target share. Nothing wrong with love — but consider letting another subject ride this interest.</div>';});
      h+='</div>';}
    if(under.length){h+='<div class="card"><h3>Needs light</h3>';
      under.forEach(function(x){h+='<div class="flag bad">'+x[0].name+' is dim. <button class="btn sm" onclick="addMission(generateMission({subject:\''+x[0].id+'\'})); go(\'today\')">Send a mission there</button></div>';});
      h+='</div>';}
    if(!over.length&&!under.length) h+='<div class="card"><div class="flag good">Beautifully balanced over the last 3 weeks.</div></div>';
  }
  /* proficiency */
  h+='<div class="card"><h3>Proficiency (parent-side only)</h3><table>';
  SUBJECTS.forEach(function(sb){
    var p=S.prof[sb.id]||{level:2,struggle:0,advance:0};
    var marker=p.struggle>=2?' <span class="mk wob">wobbling — redesign, don\'t push</span>':((p.advance>=2||(p.level>=4&&p.advance>=1))?' <span class="mk rdy">ready for more</span>':'');
    h+='<tr><td>'+sb.name+'</td><td>'+levelDots(p.level)+marker+'</td></tr>';
  });
  h+='</table></div></div></div>';
  /* pulse history */
  if(S.pulse.length){
    h+='<div class="card"><h3>North-star pulse history</h3><table><tr><th>Week of</th><th>Willingness</th><th>Your energy</th><th>Note</th></tr>';
    S.pulse.slice().sort(function(a,b){return b.week.localeCompare(a.week);}).forEach(function(p){
      h+='<tr><td>'+fmtDate(p.week)+'</td><td>'+p.willing+'/5</td><td>'+p.parentEnergy+'/5</td><td>'+esc(p.note||"")+'</td></tr>';
    });
    h+='</table><p class="muted small" style="margin-top:6px">If willingness trends down two weeks running: pause, shrink, re-wrap. The plan serves the child, never the reverse.</p></div>';
  }
  return h;
}

/* ================= BOOT ================= */
var TABS=[["today","Today"],["week","Week"],["month","Month"],["quarter","Quarter"],["missions","Missions"],["dash","Dashboard"],["settings","Settings"]];
var currentTab="today";
function renderNav(){
  $("nav").innerHTML=TABS.map(function(t){
    return '<button class="'+(currentTab===t[0]?"active":"")+'" onclick="go(\''+t[0]+'\')">'+t[1]+'</button>';
  }).join("");
}
function go(tab){currentTab=tab; renderNav(); renderView();}
function renderView(){
  var v=$("view");
  if(currentTab==="today") v.innerHTML=viewToday();
  else if(currentTab==="week") v.innerHTML=viewWeek();
  else if(currentTab==="month") v.innerHTML=viewMonth();
  else if(currentTab==="quarter") v.innerHTML=viewQuarter();
  else if(currentTab==="missions") v.innerHTML=viewMissions();
  else if(currentTab==="dash") v.innerHTML=viewDash();
  else if(currentTab==="settings") v.innerHTML=viewSettings();
  var hooks=v.querySelectorAll("[data-hook]");
  for(var i=0;i<hooks.length;i++){var fn=window[hooks[i].getAttribute("data-hook")]; if(fn) fn(hooks[i]);}
}
function openModal(html){$("modalBox").innerHTML=html; $("modalBack").classList.add("open");}
function closeModal(){$("modalBack").classList.remove("open");}
function openFeedback(){
  var body="Thanks for trying Lantero! A few prompts (answer any you like):\n\n"
    +"- What did your child think of the missions?\n"
    +"- What felt useful, and what was confusing?\n"
    +"- Did anything not work on your phone or computer?\n"
    +"- What would make you keep using it?\n\n"
    +"Tip: you can attach a backup from Settings > Data (Export backup) so I can see your setup.\n";
  window.location.href="mailto:prokennedy+lantero@gmail.com?subject="+encodeURIComponent("Lantero feedback")+"&body="+encodeURIComponent(body);
}
function boot(){
  load(); initProf();
  if(Object.keys(S.targets).length===0) applyModeTargets();
  $("hdrWho").textContent=S.profile.childName? (S.profile.childName+" · "+({homeschool:"Homeschool",summer:"Summer",afterschool:"After-school"})[S.profile.mode]) : "";
  renderNav();
  if(!S.onboarded){startOnboarding();} else {renderView();}
}
document.addEventListener("DOMContentLoaded",boot);
</script>
